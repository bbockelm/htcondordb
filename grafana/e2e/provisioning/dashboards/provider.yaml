# Provision the shipped dashboard (src/dashboards, mounted to /var/lib/grafana/dashboards)
# so the E2E can open "HTCondorDB Overview" and assert it renders.
apiVersion: 1
providers:
  - name: htcondordb
    type: file
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
  # E2E-only dashboards (not shipped with the plugin), e.g. the time_bucket time series.
  - name: htcondordb-e2e
    type: file
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards-e2e
