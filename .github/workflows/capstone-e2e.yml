name: capstone-e2e

# End-to-end capstone: a real personal HTCondor pool (condor_master + schedd + startd +
# collector + negotiator, from the installed binaries via the golang-htcondor harness), a
# real Redpanda broker, the htcondordb daemon running its schedd-sync job-queue watcher, and
# the kafkasync exporter. Submits a job, runs it to completion, and asserts Kafka saw the
# job's lifecycle (live upsert -> tombstone on completion). No Docker for HTCondor.

on:
  push:
  pull_request:

jobs:
  capstone:
    name: Capstone E2E (condor -> htcondordb -> kafka)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout htcondordb
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { path: htcondordb }

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with: { go-version: '1.25' }

      - name: Install HTCondor
        run: |
          wget -qO - https://research.cs.wisc.edu/htcondor/repo/keys/HTCondor-25.x-Key | sudo gpg --dearmor -o /usr/share/keyrings/htcondor-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/htcondor-archive-keyring.gpg] http://research.cs.wisc.edu/htcondor/repo/ubuntu/25.x $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/htcondor.list
          sudo apt-get update
          sudo apt-get install -y condor

      - name: Install Redpanda (native; test prefers it over docker)
        run: |
          curl -1sLf 'https://dl.redpanda.com/nzc4ZYQK3WRGd9sy/redpanda/cfg/setup/bash.deb.sh' | sudo -E bash
          sudo apt-get install -y redpanda
          redpanda --version

      # Build the daemon binaries and the test binary ONCE, as the normal user (so `go` and
      # its caches never run privileged), and reuse them for both runs below.
      # -buildvcs=false: the CI checkout layout (repo in a subdirectory) can make the VCS
      # stamp fail the build.
      - name: Build binaries + test binary (once)
        working-directory: htcondordb
        env:
          GOFLAGS: -mod=mod
          GOPRIVATE: github.com/bbockelm,github.com/PelicanPlatform
        run: |
          go build -buildvcs=false -o /tmp/htcondordb ./cmd/htcondordb
          ( cd kafkasync && go build -buildvcs=false -o /tmp/kafkasync ./cmd/kafkasync )
          ( cd kafkasync && go test -buildvcs=false -c -o /tmp/capstone.test -run TestCapstoneE2E . )

      - name: Run capstone E2E (unprivileged)
        env:
          HTCONDORDB_BIN: /tmp/htcondordb
          KAFKASYNC_BIN: /tmp/kafkasync
        run: /tmp/capstone.test -test.run '^TestCapstoneE2E$' -test.v -test.timeout 15m

      # Run the same pre-built test binary as root: the harness runs the pool root->condor,
      # htcondordb drops privilege to condor, kafkasync runs as root -- the production
      # privilege model. apt's condor package created the condor user the drops need.
      - name: Run capstone E2E (as root, privilege-drop path)
        run: |
          sudo -E env "PATH=$PATH" \
            HTCONDORDB_BIN=/tmp/htcondordb KAFKASYNC_BIN=/tmp/kafkasync \
            /tmp/capstone.test -test.run '^TestCapstoneE2E$' -test.v -test.timeout 15m
